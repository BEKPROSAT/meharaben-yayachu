name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up MinGW
        uses: msys2/setup-msys2@v2
        with:
          install: mingw-w64-x86_64-gcc make

      - name: Build EXE
        shell: msys2 {0}
        run: |
          cd meharaben
          g++ -std=c++17 -Wall -I include src/*.cpp -o meharaben.exe

      - name: Upload EXE as release artifact
        uses: actions/upload-artifact@v4
        with:
          name: meharaben-exe
          path: meharaben/meharaben.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.run_number }}
          name: "Meharaben Yayachu v${{ github.run_number }}"
          files: meharaben/meharaben.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
